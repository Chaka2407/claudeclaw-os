# git-cliff configuration — generates CHANGELOG.md from Conventional Commit history.
# Usage:
#   git cliff --tag v1.3.0 -o CHANGELOG.md      # regenerate the whole file for a release
#   git cliff --unreleased --tag v1.3.0         # preview the next release section
# Docs: https://git-cliff.org

[changelog]
header = """
# Changelog

All notable changes to ClaudeClaw will be documented here.
Generated from Conventional Commit history with git-cliff.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Link "(#123)" PR references to the upstream repo.
commit_preprocessors = [
  { pattern = '\(#(\d+)\)', replace = "([#${1}](https://github.com/earlyaidopters/claudeclaw-os/pull/${1}))" },
]
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^security|^sec", group = "Security" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^(chore|build|ci|style)", skip = true },
  { message = "^Merge", skip = true },
  { body = ".*", group = "Other" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "newest"
